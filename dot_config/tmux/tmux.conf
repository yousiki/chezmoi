# =============================================================================
# Tmux Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---------------------------------------------------------------------------
# Mouse
# ---------------------------------------------------------------------------
set -g mouse on

# ---------------------------------------------------------------------------
# Vi mode
# ---------------------------------------------------------------------------
setw -g mode-keys vi

# Vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
# Keep C-b as prefix (familiar default), add C-a as secondary
set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

# ---------------------------------------------------------------------------
# Keybindings — simple and memorable
# ---------------------------------------------------------------------------
# tmux-pain-control provides: | - \ _ splits, h/j/k/l nav, H/J/K/L resize
# vim-tmux-navigator provides: Ctrl-h/j/k/l seamless vim/tmux pane nav

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window navigation (pain-control uses C-h/C-l for panes, so use [ and ])
bind -r [ previous-window
bind -r ] next-window

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ---------------------------------------------------------------------------
# Catppuccin theme (Mocha)
# ---------------------------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status-position top
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ---------------------------------------------------------------------------
# Plugins (via TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect & Continuum settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ---------------------------------------------------------------------------
# TPM path (override XDG auto-detection to keep plugins out of chezmoi)
# ---------------------------------------------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# ---------------------------------------------------------------------------
# Auto-install TPM if not present
# ---------------------------------------------------------------------------
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
